openapi: 3.0.0
info:
  title: Benjamin Betting Platform API
  version: 0.1.0
  description: API docs for the Benjamin betting platform (partial)
servers:
  - url: http://localhost:5000
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        '200':
          description: Plain text metrics
  /api/auth/login:
    post:
      summary: User login (placeholder)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
